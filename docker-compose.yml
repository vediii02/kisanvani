# version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kisanvani_postgres
    environment:
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: kisanvani
      POSTGRES_USER: kisanvani
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kisanvani -d kisanvani"]
      interval: 10s
      timeout: 20s
      retries: 10
    networks:
      - kisanvani_network

  redis:
    image: redis:7-alpine
    container_name: kisanvani_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - kisanvani_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kisanvani_backend
    ports:
      - "8001:8001"
    env_file:
      - .env

    environment:
      PG_HOST: kisanvani_postgres
      PG_PORT: 5432
      PG_USER: kisanvani
      PG_PASSWORD: rootpassword
      PG_DATABASE: kisanvani
      DATABASE_URL: postgresql+asyncpg://kisanvani:rootpassword@kisanvani_postgres:5432/kisanvani
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: http://localhost:3001,http://34.47.250.57:3001,https://kisan.rechargestudio.com,http://kisan.rechargestudio.com

      DEFAULT_STT_PROVIDER: "sarvam"
      DEFAULT_TTS_PROVIDER: "sarvam"
      DEFAULT_LLM_PROVIDER: "groq"
      DEFAULT_LLM_MODEL: "llama3-70b-8192"

      GOOGLE_APPLICATION_CREDENTIALS: /app/google-creds.json
      BASE_URL: https://kisan.rechargestudio.com

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    volumes:
      - ./backend:/app
      - ./backend/google-creds.json:/app/google-creds.json

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - kisanvani_network

    # 👇 IMPORTANT FIX — migrate DB then run uvicorn
    command: >
      sh -c "/app/prestart.sh"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kisanvani_frontend
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      REACT_APP_BACKEND_URL: /api
      CHOKIDAR_USEPOLLING: true
      WATCHPACK_POLLING: true
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - kisanvani_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: kisanvani_pgadmin
    ports:
      - "8081:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    depends_on:
      - postgres
    networks:
      - kisanvani_network

volumes:
  pgdata:
  redis_data:

networks:
  kisanvani_network:
    driver: bridge
