# version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kisanvani_postgres
    # network_mode: host
    ports:
      - "5434:5432"
    environment:
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: kisanvani
      POSTGRES_USER: kisanvani
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kisanvani -d kisanvani"]
      interval: 10s
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kisanvani_redis
    # network_mode: host
    ports:
      - "6380:6379" # Expose 6379 from container to 6380 on host to avoid conflict if needed, though containers talk internally on 6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kisanvani_backend
    # network_mode: host
    ports:
      - "8001:8001"
    env_file:
      - .env

    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: kisanvani
      PG_PASSWORD: rootpassword
      PG_DATABASE: kisanvani
      DATABASE_URL: postgresql+asyncpg://kisanvani:rootpassword@postgres:5432/kisanvani
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      SARVAM_API_KEY: ${SARVAM_API_KEY}
      GOOGLE_TTS_API_KEY: ${GOOGLE_TTS_API_KEY}
      APP_ENV: ${APP_ENV:-development}

      DEFAULT_STT_PROVIDER: ${DEFAULT_STT_PROVIDER:-sarvam}
      DEFAULT_TTS_PROVIDER: ${DEFAULT_TTS_PROVIDER:-sarvam}
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-groq}
      DEFAULT_LLM_MODEL: ${DEFAULT_LLM_MODEL:-llama3-70b-8192}

      GOOGLE_APPLICATION_CREDENTIALS: /app/google-creds.json
      BASE_URL: ${BASE_URL:-http://localhost:8001}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    volumes:
      - ./backend:/app
      - ./backend/google-creds.json:/app/google-creds.json

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

    command: >
      bash /app/prestart.sh

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kisanvani_frontend
    # network_mode: host
    ports:
      - "3001:3001" # Nginx is listening on 3001 inside the container
    environment:
      PORT: 3001
      REACT_APP_BACKEND_URL: /api
      CHOKIDAR_USEPOLLING: true
      WATCHPACK_POLLING: true
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 3001"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  pgadmin:
    image: dpage/pgadmin4
    container_name: kisanvani_pgadmin
    # network_mode: host
    ports:
      - "5050:80"
    environment:
      PG_HOST: postgres
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    depends_on:
      - postgres

volumes:
  pgdata:
  redis_data:
